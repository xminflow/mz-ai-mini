services:
  postgres:
    image: postgres:18-alpine
    container_name: mz-ai-backend-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mzai
      POSTGRES_PASSWORD: mzai
      POSTGRES_DB: mz_ai_backend_dev
      TZ: UTC
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U mzai -d mz_ai_backend_dev
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_dev_data:
